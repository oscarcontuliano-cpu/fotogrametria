<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1c1c1e">
<title>Rover Topográfico Pro - Fotogrametría Layer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dxf-parser@1.1.2/dist/dxf-parser.js"></script>

<style>
    :root { --plomo: #8e8e93; --verde: #34c759; --azul: #007aff; --fondo: #f2f2f7; }
    body { font-family: -apple-system, sans-serif; background: var(--fondo); margin: 0; padding: 0; overflow-x: hidden; }
    .container { max-width: 500px; margin: 0 auto; background: #fff; min-height: 100vh; padding: 15px; box-sizing: border-box; }
    
    #loginOverlay { position: fixed; inset: 0; background: #1c1c1e; z-index: 10000; display: flex; align-items: center; justify-content: center; }
    .msg-box { background: #fff; padding: 25px; border-radius: 18px; text-align: center; width: 85%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    .card { background: #f8f8fa; border: 1px solid #e5e5ea; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
    h4 { margin: 0 0 8px 0; color: var(--plomo); text-transform: uppercase; font-size: 10px; letter-spacing: 1px; }
    
    input, select { width: 100%; padding: 12px; margin: 5px 0 10px 0; border: 1px solid #d1d1d6; border-radius: 8px; font-size: 14px; background: #fff; }
    
    button { width: 100%; padding: 14px; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; }
    .btn-azul { background: var(--azul); color: #fff; }
    .btn-verde { background: var(--verde); color: #fff; }
    .btn-plomo { background: var(--plomo); color: #fff; }
    .btn-rojo { background: #ff3b30; color: #fff; }

    #mapContainer { position: relative; margin-top: 15px; border-radius: 12px; overflow: hidden; border: 1px solid #ddd; height: 450px; }
    #mapa { height: 100%; width: 100%; background: #000; }
    
    .tier-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #eee; }
    .list { max-height: 120px; overflow-y: auto; font-size: 11px; padding: 0; list-style: none; margin: 10px 0; border: 1px solid #eee; border-radius: 8px; }
    .list-item { padding: 8px; border-bottom: 1px solid #eee; background: #fff; }
</style>
</head>
<body>

<div id="loginOverlay">
    <div class="msg-box">
        <h3>Acceso Rover</h3>
        <input type="password" id="pass" placeholder="Contraseña">
        <button class="btn-azul" onclick="checkPass()">ACCEDER</button>
    </div>
</div>

<div class="container">
    <div class="card">
        <h4>1. Capas y Diseño</h4>
        <select id="dxfSys">
            <option value="psad">PSAD56 UTM 19S</option>
            <option value="local">Coordenadas Locales</option>
        </select>
        <input type="file" id="file" accept=".dxf" multiple>
        <button class="btn-azul" onclick="loadDXF()">CARGAR DXF</button>
        
        <div id="fileManager" style="margin-top: 15px;">
            <h4 style="color: #333;">Control de Capas:</h4>
            <div id="layerControls">
                <div class="tier-row" style="background:#e8f4ff; padding:6px 10px; border-radius:6px; margin-bottom:5px;">
                    <label style="font-size:12px; font-weight:bold; cursor:pointer;">
                        <input type="checkbox" id="checkFoto" onchange="toggleFotogrametria()"> 🛰️ Fotogrametría Pix4D
                    </label>
                </div>
                <div id="fileList"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <h4>2. Control GPS</h4>
        <button class="btn-plomo" id="gpsBtn" onclick="toggleGPS()">🛰️ GPS APAGADO</button>
        <div id="statusAcc" style="font-size: 11px; text-align: center; margin-top: 5px;">--</div>
    </div>

    <div id="mapContainer">
        <div id="mapa"></div>
    </div>
</div>

<script>
const CLAVE = "topo2026";
let map, mLayer, posMarker = null, watchId = null;
let cLat, cLon, cAlt = 0, points = [];
let fileLayers = {}; 

// --- CONFIGURACIÓN DE CAPAS ---
// REEMPLAZA ESTE ENLACE con el enlace de Tiles (XYZ) de tu Pix4D
const URL_TILES_PIX4D = "https://cloud.pix4d.com/tiles/{z}/{x}/{y}.png?dataset=2671082&token=b56028b2-fae7-448d-8196-a3fd4c51a1ba";

let layerGoogle = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxNativeZoom: 21, maxZoom: 28 });
let layerPix4D = L.tileLayer(URL_TILES_PIX4D, { maxNativeZoom: 21, maxZoom: 28, opacity: 1.0 });

function initMap() {
    map = L.map('mapa', { maxZoom: 28, zoomControl: true }).setView([-22.36, -68.85], 16);
    layerGoogle.addTo(map); // Satélite por defecto
    mLayer = L.featureGroup().addTo(map);
}

function toggleFotogrametria() {
    const isChecked = document.getElementById('checkFoto').checked;
    if (isChecked) {
        layerPix4D.addTo(map);
        // Si tienes las coordenadas del centro del proyecto, podrías hacer un map.flyTo
    } else {
        map.removeLayer(layerPix4D);
    }
}

// --- RESTO DE TUS FUNCIONES (DXF, GPS, ETC.) ---

function checkPass() {
    if(document.getElementById('pass').value === CLAVE) {
        document.getElementById('loginOverlay').style.display = 'none';
        initMap();
    } else alert("Clave Incorrecta");
}

// (He simplificado las funciones de transformación para ahorrar espacio, mantén las tuyas originales)
const PSAD = { a: 6378388.0, f: 1/297.0 };
function utmToLl(e, n, ellipse) { /* Tu función original */ }
function psadToWgs(e, n) { /* Tu función original */ }

async function loadDXF() {
    // Tu función original de carga de DXF aquí
    // Solo asegúrate de llamar a updateFileManagerUI() al final
}

function updateFileManagerUI() {
    const fileListDiv = document.getElementById('fileList');
    fileListDiv.innerHTML = '';
    for (let fileName in fileLayers) {
        const isVisible = map.hasLayer(fileLayers[fileName]);
        fileListDiv.innerHTML += `
            <div class="tier-row" style="background:#f0f0f5; padding:6px 10px; border-radius:6px; margin-bottom:5px;">
                <label style="font-size:12px; cursor:pointer;">
                    <input type="checkbox" ${isVisible ? 'checked' : ''} onchange="toggleFileVisibility('${fileName}')"> ${fileName}
                </label>
                <button class="btn-rojo" style="width:25px; height:25px; padding:0;" onclick="removeFile('${fileName}')">X</button>
            </div>`;
    }
}

function toggleFileVisibility(fileName) {
    const layer = fileLayers[fileName];
    map.hasLayer(layer) ? map.removeLayer(layer) : map.addLayer(layer);
}

function toggleGPS() {
    const btn = document.getElementById('gpsBtn');
    if(!watchId) {
        watchId = navigator.geolocation.watchPosition(p => {
            cLat = p.coords.latitude; cLon = p.coords.longitude;
            document.getElementById('statusAcc').innerText = `Precisión: ±${p.coords.accuracy.toFixed(2)}m`;
            if(!posMarker) {
                posMarker = L.circleMarker([cLat, cLon], {radius:8, color:'#fff', fillColor:'#34c759', fillOpacity:1}).addTo(map);
                map.setView([cLat, cLon], 19);
            } else posMarker.setLatLng([cLat, cLon]);
        }, null, {enableHighAccuracy:true});
        btn.className = "btn-verde"; btn.innerText = "✅ GPS ACTIVO";
    } else {
        navigator.geolocation.clearWatch(watchId); watchId = null;
        btn.className = "btn-plomo"; btn.innerText = "🛰️ GPS APAGADO";
    }
}
</script>
</body>
</html>
